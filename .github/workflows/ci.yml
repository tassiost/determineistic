name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  RUST_VERSION: "1.85.0"
  EXPECTED_HASH: "ac66bb2036beb69bb281f851ba1eb39f905eee6106f22ae0f28eae1c30d9790d"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run tests
        run: cargo test --workspace --release
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  conformance:
    name: Conformance (${{ matrix.os }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: macos-latest
            arch: x86_64
          - os: macos-latest
            arch: arm64
          - os: windows-latest
            arch: x86_64
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: rustfmt, clippy
      
      - name: Build fixtures
        run: cargo build --bin create_fixtures --release
      
      - name: Create fixtures
        run: cargo run --release --bin create_fixtures
      
      - name: Build CLI
        run: cargo build --bin drift --release
      
      - name: Determinism smoke test (100 runs)
        shell: bash
        run: |
          FIRST_HASH=""
          for i in {1..100}; do
            HASH=$(cargo run --release --bin drift -- replay --genesis fixtures/genesis.bin --events fixtures/events.bin --ticks 10 | grep world_root | awk '{print $2}')
            if [ -z "$FIRST_HASH" ]; then
              FIRST_HASH="$HASH"
              echo "First hash: $FIRST_HASH"
            fi
            if [ "$HASH" != "$FIRST_HASH" ]; then
              echo "Hash mismatch at run $i: $HASH != $FIRST_HASH"
              exit 1
            fi
          done
          echo "All 100 runs produced identical hash: $FIRST_HASH"
      
      - name: Verify against golden hash
        shell: bash
        run: |
          HASH=$(cargo run --release --bin drift -- replay --genesis fixtures/genesis.bin --events fixtures/events.bin --ticks 10 | grep world_root | awk '{print $2}')
          if [ "$HASH" != "${{ env.EXPECTED_HASH }}" ]; then
            echo "Hash mismatch with golden: $HASH != ${{ env.EXPECTED_HASH }}"
            exit 1
          fi
          echo "Hash matches golden: $HASH"
      
      - name: Upload hash as artifact
        uses: actions/upload-artifact@v4
        with:
          name: hash-${{ matrix.os }}-${{ matrix.arch }}
          path: /dev/null
          # Just a marker artifact for verification
